<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>WebAR Kalp - Mobil Sürüm</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        
        /* Mobilde parmak kapatmasın diye ekranın altına sabitlenmiş şık bilgi kutusu */
        #bilgi-kutusu {
            position: fixed;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(15, 15, 15, 0.9);
            color: #ffffff;
            padding: 15px 20px;
            border-radius: 12px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 16px;
            display: none;
            z-index: 9999;
            width: 85%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>
    <div id="bilgi-kutusu"></div>

    <a-scene 
        arjs="sourceType: webcam; debugUIEnabled: false;" 
        renderer="logarithmicDepthBuffer: true; antialias: true;" 
        vr-mode-ui="enabled: false" 
        gesture-detector 
        id="scene">

        <a-assets>
            <a-asset-item id="kalp-modeli" src="kalp.glb"></a-asset-item>
        </a-assets>

        <a-marker 
            preset="hiro" 
            raycaster="objects: .tiklanabilir" 
            emitevents="true" 
            cursor="fuse: false; rayOrigin: mouse;" 
            id="markerA">
            
            <a-entity position="0 0 0" scale="1 1 1" class="tiklanabilir" gesture-handler>
                
                <a-entity gltf-model="#kalp-modeli"></a-entity>

                <a-sphere 
                    position="0.317 0.467 -0.386" 
                    radius="0.08" 
                    color="#00ffff"
                    opacity="0.8" 
                    class="tiklanabilir bilgi-noktasi" 
                    data-bilgi="<b>Sol Karıncık</b><br>Oksijence zengin kanı vücuda pompalar."
                    animation="property: scale; to: 1.3 1.3 1.3; dir: alternate; dur: 800; loop: true">
                </a-sphere>

                <a-sphere 
                    position="0.425 -0.242 0.095" 
                    radius="0.08" 
                    color="#ff3366"
                    opacity="0.8" 
                    class="tiklanabilir bilgi-noktasi" 
                    data-bilgi="<b>Sağ Kulakçık</b><br>Vücuttan gelen kirli kanın toplandığı yerdir."
                    animation="property: scale; to: 1.3 1.3 1.3; dir: alternate; dur: 800; loop: true">
                </a-sphere>

            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const bilgiKutusu = document.getElementById("bilgi-kutusu");
            const scene = document.querySelector('a-scene');
            let zamanlayici;

            // Dokunma (Touch) ve Tıklama olaylarını yakalayan sistem
            scene.addEventListener('click', function (evt) {
                if (evt.detail.intersectedEl && evt.detail.intersectedEl.classList.contains('bilgi-noktasi')) {
                    const metin = evt.detail.intersectedEl.getAttribute("data-bilgi");
                    
                    bilgiKutusu.innerHTML = metin;
                    bilgiKutusu.style.display = "block";

                    clearTimeout(zamanlayici);
                    zamanlayici = setTimeout(function() {
                        bilgiKutusu.style.display = "none";
                    }, 4000);
                } else {
                    bilgiKutusu.style.display = "none";
                }
            });
        });
    </script>
</body>
</html>
