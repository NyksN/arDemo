<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>WebAR Kalp - Kesin Çözüm</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        
        #bilgi-kutusu {
            position: fixed;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(15, 15, 15, 0.9);
            color: #ffffff;
            padding: 15px 20px;
            border-radius: 12px;
            font-family: Arial, sans-serif;
            font-size: 16px;
            display: none;
            z-index: 9999;
            width: 85%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none; /* Kutuya tıklanmasını engelle */
        }
    </style>
</head>

<body>
    <div id="bilgi-kutusu"></div>

    <a-scene 
        arjs="sourceType: webcam; debugUIEnabled: false;" 
        renderer="logarithmicDepthBuffer: true; antialias: true;" 
        vr-mode-ui="enabled: false" 
        gesture-detector 
        id="scene">

        <a-assets>
            <a-asset-item id="kalp-modeli" src="kalp.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro" id="markerA">
            
            <a-entity position="0 0 0" scale="1 1 1" gesture-handler>
                
                <a-entity gltf-model="#kalp-modeli"></a-entity>

                <a-sphere 
                    position="0.317 0.467 -0.386" 
                    radius="0.15" 
                    color="#00ffff"
                    opacity="0.8" 
                    class="bilgi-noktasi" 
                    data-bilgi="<b>Sol Karıncık</b><br>Oksijence zengin kanı vücuda pompalar."
                    animation="property: scale; to: 1.3 1.3 1.3; dir: alternate; dur: 800; loop: true">
                </a-sphere>

                <a-sphere 
                    position="0.425 -0.242 0.095" 
                    radius="0.15" 
                    color="#ff3366"
                    opacity="0.8" 
                    class="bilgi-noktasi" 
                    data-bilgi="<b>Sağ Kulakçık</b><br>Vücuttan gelen kirli kanın toplandığı yerdir."
                    animation="property: scale; to: 1.3 1.3 1.3; dir: alternate; dur: 800; loop: true">
                </a-sphere>

            </a-entity>
        </a-marker>

        <a-entity camera cursor="rayOrigin: mouse;" raycaster="objects: .bilgi-noktasi"></a-entity>

    </a-scene>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const bilgiKutusu = document.getElementById("bilgi-kutusu");
            const noktalar = document.querySelectorAll(".bilgi-noktasi");
            let zamanlayici;

            noktalar.forEach(function(nokta) {
                // Hem fare tıklamasını hem de mobildeki "ekrana dokunma" (touchstart) olayını dinliyoruz
                ['click', 'touchstart'].forEach(function(etkinlik) {
                    nokta.addEventListener(etkinlik, function(evt) {
                        
                        // Zoom eklentisinin bu dokunuşu yutmasını engelliyoruz
                        evt.stopPropagation();
                        if(evt.cancelable) evt.preventDefault(); 

                        const metin = this.getAttribute("data-bilgi");
                        bilgiKutusu.innerHTML = metin;
                        bilgiKutusu.style.display = "block";

                        clearTimeout(zamanlayici);
                        zamanlayici = setTimeout(function() {
                            bilgiKutusu.style.display = "none";
                        }, 4000);
                    });
                });
            });

            // Ekranda boş bir yere dokunulursa kutuyu kapat
            document.querySelector('a-scene').addEventListener('touchstart', function(evt) {
                // Eğer dokunulan şey bir bilgi noktası DEĞİLSE kapat
                if (!evt.target.classList.contains('bilgi-noktasi')) {
                    bilgiKutusu.style.display = "none";
                }
            });
        });
    </script>
</body>
</html>
