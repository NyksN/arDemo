<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>WebAR Kalp - Stabil Sürüm</title>

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    a-scene {
      position: fixed !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    .top-card {
      position: absolute;
      top: max(10px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      width: min(92vw, 420px);
      background: rgba(12, 16, 24, 0.78);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 16px;
      padding: 12px 14px;
      box-sizing: border-box;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.28);
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 4px 0;
    }

    .subtitle {
      margin: 0;
      font-size: 13px;
      line-height: 1.4;
      color: #d6deef;
    }

    .status {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: #e8f0ff;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      padding: 8px 10px;
      white-space: nowrap;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #ffd166;
      box-shadow: 0 0 10px rgba(255,209,102,0.7);
    }

    .status.ok .dot {
      background: #5ef0a8;
      box-shadow: 0 0 10px rgba(94,240,168,0.7);
    }

    .status.cam .dot {
      background: #62dfff;
      box-shadow: 0 0 10px rgba(98,223,255,0.7);
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: calc(14px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      width: min(92vw, 420px);
      background: rgba(12, 16, 24, 0.72);
      color: #dfe7f7;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 16px;
      padding: 11px 14px;
      box-sizing: border-box;
      font-size: 13px;
      line-height: 1.45;
      text-align: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.22);
    }

    #infoBox {
      position: absolute;
      left: 50%;
      bottom: calc(74px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      width: min(92vw, 390px);
      background: rgba(10, 14, 22, 0.92);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 18px;
      box-sizing: border-box;
      padding: 14px;
      display: none;
      pointer-events: auto;
      box-shadow: 0 16px 36px rgba(0,0,0,0.34);
    }

    #infoBox.show { display: block; }

    .info-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .info-kicker {
      font-size: 11px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: #84eaff;
      font-weight: 700;
    }

    #infoTitle {
      margin: 4px 0 0 0;
      font-size: 20px;
      line-height: 1.15;
    }

    #infoText {
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
      color: #dfe7f7;
    }

    #closeBtn {
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08);
      color: #fff;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      pointer-events: auto;
    }

    .legend {
      position: absolute;
      right: 10px;
      bottom: calc(88px + env(safe-area-inset-bottom));
      background: rgba(12, 16, 24, 0.72);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 14px;
      padding: 10px 12px;
      box-sizing: border-box;
      font-size: 12px;
      line-height: 1.45;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.22);
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-row + .legend-row { margin-top: 6px; }

    .legend-color {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .cyan { background: #67e8ff; box-shadow: 0 0 10px rgba(103,232,255,0.75); }
    .pink { background: #ff6b9b; box-shadow: 0 0 10px rgba(255,107,155,0.75); }

    @media (max-width: 720px) {
      .legend { display: none; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="overlay">
      <div class="top-card">
        <div class="top-row">
          <div>
            <h1 class="title">Etkileşimli Kalp AR</h1>
            <p class="subtitle">Hiro markerını göster. Dışarıdaki büyük kürelere dokunarak bilgi aç.</p>
          </div>
          <div id="statusBox" class="status">
            <span class="dot"></span>
            <span id="statusText">Kamera hazırlanıyor</span>
          </div>
        </div>
      </div>

      <div id="infoBox">
        <div class="info-head">
          <div>
            <div class="info-kicker">Anatomi bilgisi</div>
            <h2 id="infoTitle">Bölüm</h2>
          </div>
          <button id="closeBtn" type="button" aria-label="Kapat">×</button>
        </div>
        <p id="infoText">Bilgi burada açılacak.</p>
      </div>

      <div class="legend">
        <div class="legend-row"><span class="legend-color cyan"></span><span>Sol Karıncık</span></div>
        <div class="legend-row"><span class="legend-color pink"></span><span>Sağ Kulakçık</span></div>
      </div>

      <div class="hint" id="hintText">Kalp görünmüyorsa markerı düz tut, ortamı aydınlat ve sayfayı HTTPS ile aç.</div>
    </div>

    <a-scene
      id="scene"
      embedded
      vr-mode-ui="enabled: false"
      renderer="alpha: true; antialias: true; logarithmicDepthBuffer: true;"
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">

      <a-assets>
        <a-asset-item id="kalp-modeli" src="kalp.glb"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro" emitevents="true" id="markerA">
        <a-entity id="heartRoot" position="0 0 0" rotation="0 0 0" scale="1 1 1">
          <a-entity id="heartModel" gltf-model="#kalp-modeli"></a-entity>

          <!-- Orijinal referans noktaları -->
          <a-sphere position="0.317 0.467 -0.386" radius="0.035" color="#67e8ff" opacity="0.95"></a-sphere>
          <a-sphere position="0.425 -0.242 0.095" radius="0.035" color="#ff6b9b" opacity="0.95"></a-sphere>

          <!-- Bağlantı çizgileri -->
          <a-entity line="start: 0.317 0.467 -0.386; end: 0.66 0.70 -0.68; color: #67e8ff; opacity: 0.95"></a-entity>
          <a-entity line="start: 0.425 -0.242 0.095; end: 0.74 -0.44 0.32; color: #ff6b9b; opacity: 0.95"></a-entity>

          <!-- Dışarı taşınmış büyük dokunma küreleri -->
          <a-sphere
            id="hotspot-sol-karincik"
            class="hotspot"
            position="0.66 0.70 -0.68"
            radius="0.16"
            color="#67e8ff"
            opacity="0.85"
            data-baslik="Sol Karıncık"
            data-bilgi="Oksijence zengin kanı vücuda pompalar. Kalbin en güçlü pompa odacıklarından biridir ve sistemik dolaşımın ana itici gücüdür."
            animation="property: scale; to: 1.16 1.16 1.16; dir: alternate; dur: 900; loop: true; easing: easeInOutSine">
          </a-sphere>

          <a-sphere
            id="hotspot-sag-kulakcik"
            class="hotspot"
            position="0.74 -0.44 0.32"
            radius="0.16"
            color="#ff6b9b"
            opacity="0.85"
            data-baslik="Sağ Kulakçık"
            data-bilgi="Vücuttan dönen oksijence fakir kan burada toplanır. Kanı sağ karıncığa aktararak akciğer dolaşımının başlamasına yardımcı olur."
            animation="property: scale; to: 1.16 1.16 1.16; dir: alternate; dur: 900; loop: true; easing: easeInOutSine">
          </a-sphere>
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const sceneEl = document.getElementById('scene');
      const markerEl = document.getElementById('markerA');
      const cameraEl = sceneEl.querySelector('[camera]');
      const infoBox = document.getElementById('infoBox');
      const infoTitle = document.getElementById('infoTitle');
      const infoText = document.getElementById('infoText');
      const closeBtn = document.getElementById('closeBtn');
      const statusBox = document.getElementById('statusBox');
      const statusText = document.getElementById('statusText');
      const hintText = document.getElementById('hintText');
      const hotspotEls = Array.from(document.querySelectorAll('.hotspot'));

      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();
      const clickableRoots = [];
      let markerVisible = false;
      let modelLoaded = false;
      let lastTouchTime = 0;
      let hideTimer = null;

      function setStatus(mode, text) {
        statusBox.className = 'status';
        if (mode) statusBox.classList.add(mode);
        statusText.textContent = text;
      }

      function showInfo(el) {
        clearTimeout(hideTimer);
        infoTitle.textContent = el.getAttribute('data-baslik') || 'Bilgi';
        infoText.textContent = el.getAttribute('data-bilgi') || 'Bilgi bulunamadı.';
        infoBox.classList.add('show');
        hideTimer = setTimeout(hideInfo, 7000);
      }

      function hideInfo() {
        clearTimeout(hideTimer);
        infoBox.classList.remove('show');
      }

      function markClickable(el) {
        const root = el.object3D;
        root.traverse(function (node) {
          node.userData.hotspotEl = el;
        });
        clickableRoots.push(root);
      }

      function rebuildClickableList() {
        clickableRoots.length = 0;
        hotspotEls.forEach(markClickable);
      }

      function getCanvasRect() {
        if (!sceneEl.canvas) return null;
        return sceneEl.canvas.getBoundingClientRect();
      }

      function pickHotspot(clientX, clientY) {
        if (!sceneEl.canvas || !markerVisible || !modelLoaded) return null;

        const camera = cameraEl.getObject3D('camera');
        const rect = getCanvasRect();
        if (!camera || !rect) return null;

        pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(pointer, camera);
        const hits = raycaster.intersectObjects(clickableRoots, true);

        for (const hit of hits) {
          const el = hit.object && hit.object.userData ? hit.object.userData.hotspotEl : null;
          if (el) return el;
        }
        return null;
      }

      function activateFromPoint(clientX, clientY, target) {
        if (target && target.closest && target.closest('#infoBox')) return;
        const picked = pickHotspot(clientX, clientY);
        if (picked) {
          showInfo(picked);
        } else if (markerVisible) {
          hideInfo();
        }
      }

      closeBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        hideInfo();
      });

      closeBtn.addEventListener('touchstart', function (e) {
        e.preventDefault();
        e.stopPropagation();
        hideInfo();
      }, { passive: false });

      window.addEventListener('touchend', function (e) {
        if (!e.changedTouches || !e.changedTouches.length) return;
        const t = e.changedTouches[0];
        lastTouchTime = Date.now();
        activateFromPoint(t.clientX, t.clientY, e.target);
      }, { passive: true });

      window.addEventListener('click', function (e) {
        if (Date.now() - lastTouchTime < 500) return;
        activateFromPoint(e.clientX, e.clientY, e.target);
      });

      hotspotEls.forEach(function (el) {
        el.addEventListener('loaded', rebuildClickableList);
      });

      const heartModel = document.getElementById('heartModel');
      heartModel.addEventListener('model-loaded', function () {
        modelLoaded = true;
        hintText.textContent = 'Kalp yüklendi. Markerı sabit tut ve dışarıdaki büyük kürelere dokun.';
      });

      heartModel.addEventListener('model-error', function () {
        hintText.textContent = 'kalp.glb yüklenemedi. Model dosyasının index.html ile aynı klasörde olduğundan emin ol.';
      });

      sceneEl.addEventListener('loaded', function () {
        if (sceneEl.renderer) {
          sceneEl.renderer.setClearColor(0x000000, 0);
        }
        setStatus('cam', 'Kamera açık');
      });

      markerEl.addEventListener('markerFound', function () {
        markerVisible = true;
        setStatus('ok', 'Marker bulundu');
        hintText.textContent = 'Kalp görünmeli. Büyük kürelere dokunarak bilgi açabilirsin.';
      });

      markerEl.addEventListener('markerLost', function () {
        markerVisible = false;
        hideInfo();
        setStatus('cam', 'Marker bekleniyor');
        hintText.textContent = 'Marker kadrajdan çıktı. Hiro markerını yeniden kameraya göster.';
      });

      const videoProbe = setInterval(function () {
        const video = document.querySelector('video') || document.querySelector('.arjs-video');
        if (video) {
          video.setAttribute('playsinline', 'true');
          video.setAttribute('webkit-playsinline', 'true');
          setStatus('cam', 'Kamera aktif');
          clearInterval(videoProbe);
        }
      }, 500);

      setTimeout(function () {
        const video = document.querySelector('video') || document.querySelector('.arjs-video');
        if (!video) {
          setStatus('', 'Kamera açılamadı');
          hintText.textContent = 'Kamera siyahsa veya açılmıyorsa siteyi HTTPS üzerinden ve tercihen mobil Chrome ile aç.';
        }
      }, 7000);
    });
  </script>
</body>
</html>
