<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Demo - Artırılmış Gerçeklik</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }

    /* Bilgilendirme overlay */
    #info-overlay {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 9999;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.92), rgba(30, 58, 138, 0.88));
      backdrop-filter: blur(12px);
      color: white;
      padding: 20px 24px;
      text-align: center;
      border-bottom: 2px solid rgba(96, 165, 250, 0.4);
      animation: slideDown 0.6s ease-out;
    }

    @keyframes slideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    #info-overlay h2 {
      margin: 0 0 8px 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #info-overlay p {
      margin: 0;
      font-size: 13px;
      opacity: 0.85;
      line-height: 1.5;
    }

    #info-overlay .marker-hint {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      font-size: 12px;
      border: 1px solid rgba(255,255,255,0.15);
    }

    #info-overlay .marker-hint a {
      color: #60a5fa;
      text-decoration: underline;
    }

    #close-btn {
      position: absolute;
      top: 12px;
      right: 16px;
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    #close-btn:hover { background: rgba(255,255,255,0.3); }

    /* AR badge */
    #ar-badge {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(8px);
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      border: 1px solid rgba(96, 165, 250, 0.3);
      display: flex;
      align-items: center;
      gap: 8px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(96, 165, 250, 0.4); }
      50% { box-shadow: 0 0 0 12px rgba(96, 165, 250, 0); }
    }

    #ar-badge .dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>

  <!-- Bilgilendirme paneli -->
  <div id="info-overlay">
    <button id="close-btn" onclick="this.parentElement.style.display='none'">✕</button>
    <h2>🔮 Artırılmış Gerçeklik Demo</h2>
    <p>Kameranızı <strong>HIRO marker</strong>'a doğrultun ve 3D objelerin belirmesini izleyin!</p>
    <div class="marker-hint">
      📎 Marker'ı buradan yazdırın:
      <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" target="_blank">
        HIRO Marker İndir
      </a>
    </div>
  </div>

  <!-- AR durumu -->
  <div id="ar-badge">
    <span class="dot"></span>
    Kamera aktif — Marker'ı arayın
  </div>

  <!-- A-Frame AR sahnesi -->
  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true"
  >
    <!-- Hiro marker üzerinde gösterilecek 3D objeler -->
    <a-marker preset="hiro">

      <!-- Dönen renkli küp -->
      <a-box
        position="0 0.6 0"
        scale="0.6 0.6 0.6"
        color="#6366f1"
        opacity="0.9"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear"
        animation__scale="property: scale; from: 0.6 0.6 0.6; to: 0.75 0.75 0.75; dir: alternate; loop: true; dur: 1500; easing: easeInOutQuad"
      ></a-box>

      <!-- Yörüngede dönen küre -->
      <a-entity
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear"
      >
        <a-sphere
          position="1 0.6 0"
          radius="0.2"
          color="#f472b6"
          opacity="0.85"
        ></a-sphere>
      </a-entity>

      <!-- İkinci yörünge -->
      <a-entity
        animation="property: rotation; to: 0 -360 0; loop: true; dur: 5000; easing: linear"
      >
        <a-sphere
          position="0 0.6 1.2"
          radius="0.15"
          color="#4ade80"
          opacity="0.85"
        ></a-sphere>
      </a-entity>

      <!-- Taban platformu -->
      <a-cylinder
        position="0 0.05 0"
        radius="1.2"
        height="0.1"
        color="#1e293b"
        opacity="0.7"
      ></a-cylinder>

      <!-- Yazı -->
      <a-text
        value="AR DEMO"
        position="0 1.4 0"
        align="center"
        color="#fbbf24"
        scale="1.2 1.2 1.2"
        font="mozillavr"
        animation="property: position; from: 0 1.4 0; to: 0 1.55 0; dir: alternate; loop: true; dur: 2000; easing: easeInOutSine"
      ></a-text>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // Marker bulunduğunda badge güncelle
    const marker = document.querySelector('a-marker');
    const badge = document.getElementById('ar-badge');

    if (marker) {
      marker.addEventListener('markerFound', () => {
        badge.innerHTML = '<span class="dot" style="background:#4ade80"></span> ✅ Marker bulundu!';
        badge.style.borderColor = 'rgba(74, 222, 128, 0.5)';
      });

      marker.addEventListener('markerLost', () => {
        badge.innerHTML = '<span class="dot"></span> Kamera aktif — Marker\'ı arayın';
        badge.style.borderColor = 'rgba(96, 165, 250, 0.3)';
      });
    }
  </script>

</body>
</html>
